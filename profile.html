<!DOCTYPE html>
<html lang="th">
<head>

<title>Profile | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:linear-gradient(135deg,#F3ECFF,#FFFFFF,#E9D8FD);
overflow-x:hidden;
}

/* ดอกไม้ */

.flower{
position:fixed;
top:-50px;
font-size:24px;
pointer-events:none;
animation:fall linear infinite;
opacity:.9;
}

.f1{left:6%;animation-duration:8s;}
.f2{left:20%;animation-duration:11s;}
.f3{left:35%;animation-duration:9s;}
.f4{left:52%;animation-duration:10s;}
.f5{left:68%;animation-duration:8s;}
.f6{left:84%;animation-duration:12s;}
.f7{left:95%;animation-duration:9s;}

@keyframes fall{

0%{
transform:translateY(-100px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

nav{

position:sticky;
top:0;
background:rgba(255,255,255,.8);
backdrop-filter:blur(12px);
padding:18px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);

}

nav a{

text-decoration:none;
margin:0 18px;
font-size:18px;
font-weight:600;
color:#6B46C1;

}

nav a:hover{

color:#9F7AEA;

}

.title{

text-align:center;
margin:50px 20px;

}

.title h1{

font-size:48px;
color:#6B46C1;

}

.line{

width:120px;
height:5px;
background:#9F7AEA;
margin:18px auto;
border-radius:50px;

}

.container{

max-width:1100px;
margin:40px auto;
display:flex;
gap:40px;
padding:20px;
align-items:center;

}

.photo{

flex:1;
text-align:center;

}

.photo img{

width:320px;
height:320px;
object-fit:cover;
border-radius:30px;
border:8px solid #D6BCFA;
box-shadow:0 15px 35px rgba(155,89,182,.25);

}

.info{

flex:1;
background:rgba(255,255,255,.75);
backdrop-filter:blur(15px);
padding:40px;
border-radius:30px;
box-shadow:0 10px 30px rgba(155,89,182,.18);

}

.info h2{

color:#6B46C1;
margin-bottom:20px;

}

.info p{

font-size:20px;
line-height:40px;
color:#555;

}

.button-box{

max-width:1100px;
margin:40px auto;
display:flex;
gap:20px;

}

.button{

flex:1;
text-align:center;
padding:18px;
background:#7C3AED;
color:white;
text-decoration:none;
font-size:20px;
border-radius:50px;
font-weight:bold;
transition:.3s;

}

.button:hover{

background:#6B46C1;

}

footer{

margin-top:50px;
background:#6B46C1;
padding:25px;
text-align:center;
color:white;

}

@media(max-width:900px){

.container{

flex-direction:column;

}

.photo img{

width:220px;
height:220px;

}

}

</style>

</head>

<body>

<span class="flower f7">🌸</span>

</div>

</div>

<p>

</footer>

</html>
